<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esta Workforce OS Bridge</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }
      main {
        max-width: 560px;
        margin: 40px auto;
        padding: 24px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font: inherit;
      }
      button {
        margin-top: 18px;
        padding: 10px 14px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      .status {
        margin-top: 18px;
        padding: 12px;
        border-radius: 12px;
        background: #eff6ff;
        color: #1d4ed8;
      }
      .note {
        color: #6b7280;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Esta Workforce OS Website Bridge</h1>
      <p class="note">
        Pair this extension with the desktop agent. The extension sends only normalized hostnames, never full URLs,
        query strings, page content, cookies, or browser history.
      </p>
      <label for="port">Bridge Port</label>
      <input id="port" inputmode="numeric" placeholder="Example: 49152" />
      <label for="token">Pairing Token</label>
      <input id="token" type="password" autocomplete="off" placeholder="Paste token from desktop agent" />
      <button id="save" type="button">Save Pairing</button>
      <button id="test" type="button">Test Connection</button>
      <div id="status" class="status" role="status">Not connected</div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
